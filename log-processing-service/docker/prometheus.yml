global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'file-ingestion-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'file-ingestion-service:8080'

  - job_name: "flink-jobmanager"
    static_configs:
      - targets: ["jobmanager:9249"]

  - job_name: "flink-taskmanager"
    static_configs:
      - targets: ["taskmanager:9250"]