services:
  kafka:
    image: apache/kafka:4.3.1
    container_name: kafka
    hostname: kafka

    ports:
      - "9092:9092"

    environment:
      # KRaft Configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
  
  jobmanager:
    image: flink:2.3
    container_name: jobmanager
    depends_on:
      - kafka
      - elasticsearch
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    volumes:
      - ./log-processing-service/target/log-processing-service-1.0-SNAPSHOT.jar:/opt/flink/log-processing-service-1.0-SNAPSHOT.jar
      - ./flink-checkpoints:/opt/flink/checkpoints
    restart: unless-stopped

  taskmanager:
    image: flink:2.3
    container_name: taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    volumes:
      - ./flink-checkpoints:/opt/flink/checkpoints
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.1.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:9.1.3
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: fluent-bit
    depends_on:
      - file-ingestion-service
    ports:
      - "2020:2020"
    volumes:
      - ./fileingestionservice/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - ./fileingestionservice/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf
      - uploads-data:/app/uploads
    restart: unless-stopped

  file-ingestion-service:
    image: eclipse-temurin:17-jdk
    depends_on:
      - kafka
    container_name: file-ingestion-service
    volumes:
      - ./fileingestionservice/target/fileingestionservice-0.0.1-SNAPSHOT.jar:/app/app.jar
      - uploads-data:/app/uploads
    working_dir: /app
    command: java -jar app.jar
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  kafka-data:
  uploads-data:
  elasticsearch-data: