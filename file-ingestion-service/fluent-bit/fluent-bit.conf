[SERVICE]
    Flush          1
    Daemon         Off
    Log_Level      info
    Parsers_File   parsers.conf
    HTTP_Server    On
    HTTP_Listen    0.0.0.0
    HTTP_Port      2020

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.log
    Tag               logs.app
    Parser            log_parser
    Read_From_Head    true


[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.json
    Tag               logs.json
    Parser            json_parser
    Read_From_Head    true


[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.csv
    Tag               logs.csv
    Parser            csv_parser
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.ndjson
    Tag               logs.ndjson
    Parser            json_parser
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.txt
    Tag               logs.txt
    Parser            log_parser
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.xml
    Tag               logs.xml
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.yaml
    Tag               logs.yaml
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.yml
    Tag               logs.yml
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.properties
    Tag               logs.properties
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.conf
    Tag               logs.conf
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.ini
    Tag               logs.ini
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.tsv
    Tag               logs.tsv
    Read_From_Head    true

[INPUT]
    Name              tail
    Path              /app/uploads/logs/*/*.sql
    Tag               logs.sql
    Read_From_Head    true

[OUTPUT]
    Name http
    Match *
    Host host.docker.internal
    Port 8080
    URI /logs
    Format json